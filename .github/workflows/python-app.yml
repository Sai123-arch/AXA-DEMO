name: Build, Test and Deploy

on:
  push:
    branches: [main]

jobs:
  # ── JOB 1: Build ──────────────────────────
  build:
    name: "🔨 Build Application"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: ⬆️ Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build           # Artifact name
          path: ./dist/             # Folder to save
                

  # ── JOB 2: Test ───────────────────────────
  test:
    name: "🧪 Run Tests"
    runs-on: ubuntu-latest
    needs: build                    # Run after build

    steps:
      - uses: actions/checkout@v4

      - name: ⬇️ Download Build
        uses: actions/download-artifact@v4
        with:
          name: app-build           # Same name as upload
          path: ./dist/
  
      - name: Deploy App
        run: |
          echo "Files ready to deploy now:"
