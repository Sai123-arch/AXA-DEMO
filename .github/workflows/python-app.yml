name: Event Filter Practice

on:

  # 1. Push Event
  push:
    branches:
      - main

  # 2. Pull Request Event
  pull_request:
    types:
      - opened
      - closed

  # 3. Issue Event
  issues:
    types:
      - opened

jobs:

  demo-job:

    runs-on: ubuntu-latest

    steps:

      - name: Print Message
        run: echo "Workflow Triggered Successfully"