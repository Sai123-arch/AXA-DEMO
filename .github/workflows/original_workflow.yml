name: Job Outputs Demo

on:
  push:
    branches: [main]

jobs:

  # ── JOB 1: Generate a value ───────────────
  job1:
    name: "Generate Value"
    runs-on: ubuntu-latest

    # STEP 2️⃣ — Declare outputs at JOB level
    outputs:
      my_message: ${{ steps.set-msg.outputs.message }}

    steps:
      # STEP 1️⃣ — Set output inside a step
      - name: Set a Message
        id: set-msg            # ← id is REQUIRED to reference this step
        run: |
          echo "message=Hello from Job 1!" >> $GITHUB_OUTPUT

  # ── JOB 2: Use the value ──────────────────
  job2:
    name: "Use Value"
    runs-on: ubuntu-latest
    needs: job1               # ← Must declare dependency

    steps:
      # STEP 3️⃣ — Read the output from job1
      - name: Print Message
        run: |
          echo "Job 1 said: ${{ needs.job1.outputs.my_message }}"
          # Output: Job 1 said: Hello from Job 1 ok!



